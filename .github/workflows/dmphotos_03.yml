name: DMPhotos Bot 03

on:
  schedule:
    - cron: "3 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dmphotosbot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      BSKY_USERNAME: ${{ secrets.BSKY_USERNAME_DMPHOTOS }}
      BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD_DMPHOTOS }}
      STATE_FILE: state_dmphotos.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atproto

      - name: Run DMPhotos bot
        run: python dmphotos_reposter.py

      - name: Commit state file
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f state_dmphotos.json ]; then
            git add state_dmphotos.json
            git diff --cached --quiet || git commit -m "Update DMPhotos state"
            git push
          else
            echo "No state file found"
          fi